services:
  - type: web
    name: jd-solutions-backend
    runtime: java
    rootDir: backend/demo
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: jd-solutions-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jd-solutions-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: jd-solutions-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: jd-solutions-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: jd-solutions-db
          property: password
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: jdsolutions5049@gmail.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://www.jdsolutionss.com,https://jdsolutions5049-cpu.github.io
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: JD Solutions Admin

databases:
  - name: jd-solutions-db
    plan: free
